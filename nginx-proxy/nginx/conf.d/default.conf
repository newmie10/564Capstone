server {
    listen 80 default_server;
    server_name _;

    server_tokens off;
    add_header X-Powered-By "PHP/8.1.2" always;

    root /usr/share/nginx/html;
    index index.html;

    # Public-facing cover site
    location / {
        try_files $uri $uri/ =404;
    }

    # Device endpoint — transparent reverse proxy to Flask.
    # Strips /api/v1 prefix; preserves method, headers, and body as-is.
    location /api/v1/ {
        rewrite ^/api/v1/(.*)$ /$1 break;

        # Backend address. Override at runtime with -e FLASK_UPSTREAM=host:port
        proxy_pass http://172.17.0.1:5000;
        proxy_http_version 1.1;

        # Pass through everything from the original request
        proxy_pass_request_headers on;
        proxy_pass_request_body    on;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Don't leak that this is proxied
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;

        # Buffering off — better for streaming/long-poll style endpoints if you have any.
        # Flip to "on" if you'd rather nginx buffer full responses.
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        client_max_body_size 25M;
    }

    # Block dotfile probes
    location ~ /\.(?!well-known) {
        deny all;
    }
}
