services:
  relay:
    build: .
    container_name: flask-relay
    ports:
      - "8080:5000"
    environment:
      - PEER_A_IP=${PEER_A_IP:-127.0.0.1}
      - PEER_B_IP=${PEER_B_IP:-127.0.0.1}
      - PEER_A_FORWARD=${PEER_A_FORWARD:-http://127.0.0.1:8081/receive}
      - PEER_B_FORWARD=${PEER_B_FORWARD:-http://127.0.0.1:8082/receive}
      - FORWARD_TIMEOUT=${FORWARD_TIMEOUT:-30}
      - TRUST_PROXY=${TRUST_PROXY:-false}
    restart: unless-stopped
